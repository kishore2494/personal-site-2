<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kishore Kumar A</title>
    <!--
      Single Page Apps for GitHub Pages
      https://github.com/rafgraph/spa-github-pages
      Stash the requested deep-link path and bounce to index.html, which restores it.
      pathSegmentsToKeep = 1 because the app is served from /<repo>/.
      Set to 0 for a user page or custom domain served from the root.
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
