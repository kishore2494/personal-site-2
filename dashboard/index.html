<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Content Dashboard — Kishore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background: #03040a; color: #cbd5e1; }
      header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #1c2333; position: sticky; top: 0; background: #05060d; z-index: 5; }
      header b { color: #fff; }
      .dot { color: #34d3ff; }
      .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 57px); }
      aside { border-right: 1px solid #1c2333; padding: 14px; overflow-y: auto; max-height: calc(100vh - 57px); }
      .item { padding: 9px 11px; border-radius: 9px; cursor: pointer; font-size: 13px; }
      .item:hover { background: #11182a; }
      .item.active { background: #14223a; color: #fff; }
      .item small { display: block; color: #64748b; font-size: 11px; margin-top: 2px; }
      .badge { font-size: 10px; color: #ffb454; border: 1px solid #5a4420; border-radius: 5px; padding: 0 5px; }
      main { padding: 22px 26px; overflow-y: auto; max-height: calc(100vh - 57px); }
      label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin: 14px 0 5px; }
      input, textarea { width: 100%; background: #0a0e1a; border: 1px solid #1c2333; border-radius: 9px; color: #e2e8f0; padding: 10px 12px; font-size: 14px; font-family: inherit; }
      textarea { min-height: 360px; resize: vertical; font-family: ui-monospace, monospace; line-height: 1.55; }
      .row { display: flex; gap: 12px; } .row > div { flex: 1; }
      button { cursor: pointer; border: 0; border-radius: 999px; padding: 9px 16px; font-weight: 600; font-size: 13px; }
      .primary { background: linear-gradient(90deg, #11b8ee, #34d3ff); color: #03040a; }
      .ghost { background: #11182a; color: #cbd5e1; border: 1px solid #1c2333; }
      .danger { background: #2a1115; color: #ff9aa2; border: 1px solid #5a2027; }
      .pub { background: linear-gradient(90deg, #ff9417, #ffb454); color: #03040a; }
      .bar { display: flex; gap: 10px; align-items: center; }
      .toast { position: fixed; bottom: 18px; right: 18px; background: #0c1424; border: 1px solid #1c2333; border-radius: 10px; padding: 12px 16px; font-size: 13px; max-width: 460px; white-space: pre-wrap; display: none; }
      .chk { display: flex; align-items: center; gap: 7px; font-size: 13px; margin-top: 18px; }
      .chk input { width: auto; }
      h2 { color: #fff; margin: 0 0 4px; }
      .muted { color: #64748b; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <div>Content <b>Dashboard</b><span class="dot">.</span> <span class="muted" id="status"></span></div>
      <div class="bar">
        <button class="ghost" onclick="newPost()">+ New post</button>
        <button class="pub" onclick="publish()">Publish (commit & push)</button>
      </div>
    </header>
    <div class="layout">
      <aside id="list"></aside>
      <main>
        <h2 id="editing">New post</h2>
        <div class="muted" id="slug"></div>
        <label>Title</label>
        <input id="title" oninput="onTitle()" placeholder="My great post" />
        <div class="row">
          <div><label>Date</label><input id="date" type="date" /></div>
          <div><label>Categories (comma-sep)</label><input id="categories" placeholder="AI, Tutorial" /></div>
        </div>
        <div class="row">
          <div><label>Tags (comma-sep)</label><input id="tags" placeholder="Python, RAG" /></div>
          <div><label>Cover image URL (optional)</label><input id="image" placeholder="https://…" /></div>
        </div>
        <label>Excerpt</label>
        <input id="excerpt" placeholder="One-line summary" />
        <label>Body (Markdown)</label>
        <textarea id="body" placeholder="# Heading&#10;&#10;Write your post in Markdown…"></textarea>
        <label class="chk"><input id="draft" type="checkbox" /> Draft (hidden from the site)</label>
        <div class="bar" style="margin-top:18px">
          <button class="primary" onclick="save()">Save</button>
          <button class="danger" onclick="del()">Delete</button>
          <span class="muted" id="saved"></span>
        </div>
      </main>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      let current = null; // slug being edited, or null for new
      const $ = (id) => document.getElementById(id);
      const slugify = (s) => s.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 80);
      const toast = (m) => { const t = $("toast"); t.textContent = m; t.style.display = "block"; setTimeout(() => (t.style.display = "none"), 4000); };

      async function loadList() {
        const items = await (await fetch("/api/articles")).json();
        $("list").innerHTML = items.map((a) =>
          `<div class="item ${a.slug === current ? "active" : ""}" onclick="edit('${a.slug}')">
             <div>${a.title} ${a.draft ? '<span class="badge">draft</span>' : ""}</div>
             <small>${a.date} · ${a.categories.join(", ")}</small>
           </div>`).join("");
        const s = await (await fetch("/api/status")).json();
        $("status").textContent = s.changes ? `· ${s.changes} unpublished change(s)` : "· all published";
      }

      function fill(a) {
        $("title").value = a.title || ""; $("date").value = a.date || new Date().toISOString().slice(0,10);
        $("categories").value = (a.categories || []).join(", "); $("tags").value = (a.tags || []).join(", ");
        $("image").value = a.image || ""; $("excerpt").value = a.excerpt || ""; $("body").value = a.body || "";
        $("draft").checked = !!a.draft;
        $("editing").textContent = a.slug ? "Editing: " + a.title : "New post";
        $("slug").textContent = a.slug ? "/articles/" + a.slug : "(slug from title on save)";
      }
      function newPost() { current = null; fill({}); loadList(); }
      async function edit(slug) { current = slug; fill(await (await fetch("/api/article/" + slug)).json()); loadList(); }
      function onTitle() { if (!current) $("slug").textContent = "/articles/" + slugify($("title").value || ""); }

      async function save() {
        const data = {
          slug: current, title: $("title").value, date: $("date").value, excerpt: $("excerpt").value,
          image: $("image").value, categories: $("categories").value, tags: $("tags").value,
          draft: $("draft").checked, body: $("body").value,
        };
        const r = await (await fetch("/api/article", { method: "POST", body: JSON.stringify(data) })).json();
        current = r.slug; $("saved").textContent = "Saved ✓ " + new Date().toLocaleTimeString();
        loadList();
      }
      async function del() {
        if (!current || !confirm("Delete this post?")) return;
        await fetch("/api/article/" + current, { method: "DELETE" });
        newPost();
      }
      async function publish() {
        $("saved").textContent = "Publishing…";
        const r = await (await fetch("/api/publish", { method: "POST", body: JSON.stringify({ message: "content: update via dashboard" }) })).json();
        toast(r.ok ? "Published & pushed ✓ — the site will redeploy in ~2 min." : "Push result:\n" + r.out);
        $("saved").textContent = ""; loadList();
      }
      newPost();
    </script>
  </body>
</html>
